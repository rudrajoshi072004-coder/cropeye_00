<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Image/Favicon Logo (1).svg"  />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CROPEYE</title>
    <style>
      /* Hide Google Translate top bar/banner (keep only our header control). */
      html { margin-top: 0 !important; padding-top: 0 !important; }
      body { top: 0 !important; margin-top: 0 !important; position: relative !important; }
      iframe.goog-te-banner-frame,
      .goog-te-banner-frame,
      body > .skiptranslate.goog-te-banner-frame,
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .goog-tooltip,
      /* Hide injected floating Google "G" launcher/loader icon early */
      .goog-te-gadget-icon,
      .goog-te-gadget-simple,
      .goog-te-gadget {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        width: 0 !important;
        overflow: hidden !important;
        pointer-events: none !important;
        opacity: 0 !important;
        position: absolute !important;
        left: -9999px !important;
        border: none !important;
      }

      /* Google-injected spinner container (classnames like VIpgJd-...). Pin it bottom-left
         and prevent it from blocking app UI clicks (sidebar toggle etc.). */
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf-ti6hGc,
      .VIpgJd-ZVi9od-aZ2wEe-OiIco-ti6hGc {
        position: fixed !important;
        left: 12px !important;
        bottom: 12px !important;
        top: auto !important;
        right: auto !important;
        z-index: 9999 !important;
        pointer-events: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
